name: Analyze WordPress Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_slug:
        description: "WordPress plugin slug (e.g. woocommerce)"
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: api/go.sum

      - name: Install Semgrep
        run: pip install semgrep

      - name: Install PHPCS + WordPress Coding Standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require "squizlabs/php_codesniffer:^3.13" "wp-coding-standards/wpcs:^3.1" --no-interaction
        continue-on-error: true

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Go CLI scanner
        working-directory: api
        run: go run ./cmd/cli -json "${{ inputs.plugin_slug }}" > "../reports/${{ inputs.plugin_slug }}.json"
        env:
          GITHUB_TOKEN: ${{ secrets.VITE_GH_TOKEN }}
          PHPCS_BIN: ~/.composer/vendor/bin/phpcs

      - name: Commit report
        run: |
          git config user.name "WP Plugin Insight Bot"
          git config user.email "bot@wp-plugin-insight"
          git add reports/
          git diff --staged --quiet || git commit -m "report: ${{ inputs.plugin_slug }}"
          git push
